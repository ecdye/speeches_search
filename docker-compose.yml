services:
  next-plaid:
    image: ghcr.io/lightonai/next-plaid:cpu-1.1.1
    ports:
      - "8080:8080"
    volumes:
      - .data/indices:/data/indices
      - .data/huggingface:/data/huggingface
    environment:
      - HF_HOME=/data/huggingface
      - HF_TOKEN=${HF_TOKEN}
    command: --host 0.0.0.0 --port 8080 --index-dir /data/indices --model lightonai/answerai-colbert-small-v1-onnx --int8
